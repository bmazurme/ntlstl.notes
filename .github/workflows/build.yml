name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build-core:
    name: Core — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: core/dist
          retention-days: 1

  build-client:
    name: Client — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client-auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client-auth/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_DOMAIN: http://localhost/api/v1
          VITE_TOKEN: ${{ secrets.VITE_TOKEN }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client-auth/dist
          retention-days: 1

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [build-core, build-client]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: ./core
          push: false
          tags: lite-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client-auth
          push: false
          tags: lite-client:${{ github.sha }}
          build-args: |
            VITE_API_DOMAIN=http://localhost/api/v1
            VITE_TOKEN=${{ secrets.VITE_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

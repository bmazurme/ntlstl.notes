server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # index.html — no cache (SPA entry point, must always be fresh)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed assets (JS, CSS) — cache forever
    # Vite outputs files like /assets/index-Dj8lK9vQ.js
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Static files with known names — moderate cache
    location ~* \.(ico|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # RSS-фид и карта сайта генерируются бэкендом (динамически из БД).
    # Должно стоять ВЫШЕ регулярки \.xml ниже, иначе nginx отдаст 404 как для статики.
    location ~ ^/(rss\.xml|sitemap\.xml)$ {
        proxy_pass http://notes-core:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ~* \.(svg|txt|xml|webmanifest)$ {
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location /api {
        proxy_pass http://notes-core:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SPA fallback — route all unmatched requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # Соц-скрейперы / превью-боты мессенджеров. Они НЕ исполняют JS, поэтому не
    # видят OG-теги, которые react-helmet-async проставляет на клиенте. Такие
    # запросы отдаём в серверный пререндер (core /prerender). Поисковики
    # (Googlebot/Yandex/bing) сюда НЕ включены — они рендерят JS и получают
    # корректный Helmet, а разный HTML для них выглядел бы как клоакинг.
    map $http_user_agent $is_social_bot {
        default 0;
        "~*(facebookexternalhit|Facebot|Twitterbot|Telegram|WhatsApp|vkShare|VKShare|Slackbot|Slack-ImgProxy|Discordbot|LinkedInBot|Pinterest|redditbot|SkypeUriPreview|Embedly|Iframely|Google-InspectionTool|nuzzel|Qwantify|Applebot|TelegramBot|WhatsApp/2)" 1;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    include /etc/nginx/conf.d/*.conf;
}
